R.market=function(f){let tf='all',pf='',sb='time';

const rr2=l.r||P.find(p=>p.n===l.pn)?.r||'';
const rc={'传说':'background:rgba(255,215,0,.2);color:var(--gold)','稀有':'background:rgba(193,88,220,.2);color:var(--mag)','普通':'background:rgba(255,255,255,.1);color:var(--gt)'};

$('#p-market').innerHTML=`<div class="hdr"><button class="bk" onclick="go('home')">←</button><div class="ht">✨ 精灵交易广场</div><div style="width:30px"></div></div>
<div class="fb"><button class="fbn ${tf==='all'?'on':''}" onclick="tf='all';rr()">全部</button><button class="fbn ${tf==='sell'?'on':''}" onclick="tf='sell';rr()">出售</button><button class="fbn ${tf==='buy'?'on':''}" onclick="tf='buy';rr()">求购</button>
<select class="fsl" onchange="pf=this.value;rr()"><option value="">全部精灵</option>${pns.map(n=>`<option value="${n}" ${pf===n?'selected':''}>${gp(n)} ${n}</option>`).join('')}</select></div>
<div style="padding:0 16px">${lh}</div>
<div class="fab"><div class="fabmn" id="fabMenu">
<div class="fbi" onclick="if(rl()){go('pub','sell')}">🏷️ 发布出售</div>
<div class="fbi" onclick="if(rl()){go('pub','buy')}">📢 发布求购</div>
<div class="fbi" onclick="if(rl()){go('mypub')}">📋 我的发布</div>
<div class="fbi" onclick="if(rl()){go('profile')}">👤 我的档案</div>
</div><button class="fabm" onclick="tFab()">⚡</button></div>`;
window.tf=tf;window.pf=pf;window.sb=sb;window.rr=rr}rr()};

function rr(){$('#p-pub').innerHTML=`<div class="hdr"><button class="bk" onclick="go('market')">←</button><div class="ht">发布信息</div><div style="width:30px"></div></div>
<div class="tgb"><button class="${pt==='sell'?'on':''}" onclick="pt='sell';rr()">🏷️ 出售</button><button class="${pt==='buy'?'on':''}" onclick="pt='buy';rr()">📢 求购</button></div>

<div style="padding:0 16px;margin-top:4px"><button class="bt btg" onclick="doPub('${pt}')">✨ 发布</button></div>`;

if(l.ct.qq)info+=`<div class="gr"><span class="gl">QQ</span><span class="gv">${l.ct.qq}</span></div>`;

R.price=function(){const stats={};DB.ls.filter(l=>l.st==='active').forEach(l=>{if(!stats[l.pn])stats[l.pn]={cnt:0,tot:0,e:l.pe};stats[l.pn].cnt++;const n=parseInt(l.pr);if(n)stats[l.pn].tot+=n});
const rows=Object.entries(stats).sort((a,b)=>b[1].cnt-a[1].cnt);const mx=Math.max(...rows.map(([,v])=>v.tot/v.cnt||0),1);
$('#p-price').innerHTML=`<div class="hdr"><button class="bk" onclick="go('home')">←</button><div class="ht">📊 精灵行情参考</div><div style="width:30px"></div></div>
<div style="display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap">${['传说','稀有','普通'].map(r=>{const c=r==='传说'?'var(--gold)':r==='稀有'?'var(--mag)':'var(--gt)';return`<span style="padding:6px 16px;border-radius:20px;font-size:13px;font-weight:bold;background:rgba(255,255,255,.08);color:${c};border:1px solid ${c}">${r}</span>`}).join('')}</div>
<div class="gs"><h4>📈 热门精灵均价排行</h4>${rows.map(([n,v])=>{const avg=v.cnt?~~(v.tot/v.cnt):0;const w=avg?~~(avg/mx*100):30;
return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${v.e} ${n}</span><span style="color:var(--gold)">${avg||'面议'} · ${v.cnt}条</span></div><div class="bar" style="width:${Math.max(w,15)}%;background:linear-gradient(90deg,var(--p3),var(--mag))"></div></div>`}).join('')}</div>
<div class="gs"><h4>📖 精灵图鉴</h4>${P.map(p=>{const rc={'传说':'var(--gold)','稀有':'var(--mag)','普通':'var(--gt)'};
return`<div class="gr"><span style="font-size:20px;margin-right:6px">${p.e}</span><span>${p.n}</span><span class="gl" style="margin-left:4px">${p.t}系</span><span style="margin-left:auto;color:${rc[p.r]||'var(--gt)'};font-weight:bold">${p.r}</span></div>`}).join('')}</div>`};
